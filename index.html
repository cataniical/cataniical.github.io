<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CATANIICAL DIGITAL ARCHIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --sidebar-bg: #f8f9fa;
            --text-main: #1a1a1a;
            --text-sub: #666666;
            --border-color: #e0e0e0;
            --font-mono: 'Noto Sans Mono', monospace;
        }

        body {
            margin: 0;
            display: flex;
            height: 100vh;
            font-family: var(--font-mono);
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden;
        }

        /* サイドバー */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .brand-header {
            padding: 40px 25px 20px;
        }

        .brand-header a {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--text-main);
            cursor: pointer;
        }

        .nav-menu {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
            flex-grow: 1;
        }

        .category-label {
            padding: 20px 25px 10px;
            font-size: 0.75rem;
            color: var(--text-sub);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border-top: 1px solid #eee;
            margin-top: 10px;
        }

        .sub-menu {
            list-style: none;
            padding: 0;
            margin-bottom: 20px;
        }

        .sub-menu li a {
            display: block;
            padding: 8px 25px;
            text-decoration: none;
            color: var(--text-main);
            font-size: 0.85rem;
            cursor: pointer;
        }

        .sub-menu li a:hover {
            background-color: #efefef;
        }

        /* メインコンテンツ */
        .main-content {
            flex: 1;
            padding: 60px;
            overflow-y: auto;
        }

        .archive-entry {
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.8;
        }

        /* 画像表示の規律 */
        .archive-entry img {
            width: 100%;
            height: auto;
            margin: 20px 0;
            display: block;
            border: 1px solid var(--border-color);
        }

        .sidebar-footer {
            padding: 20px 25px;
            border-top: 1px solid var(--border-color);
        }

        .sidebar-footer a {
            text-decoration: none;
            color: var(--text-sub);
            font-size: 0.7rem;
            margin-right: 15px;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="brand-header">
            <a onclick="loadMD('README.md')">CATANIICAL</a>
        </div>
        
        <nav class="nav-menu">
            <div class="category-label">Platycerium</div>
            <ul class="sub-menu">
                <li><a onclick="loadMD('platycerium/sample.md')">SAMPLE_SPECIMEN_P01</a></li>
            </ul>

            <div class="category-label">Aglaonema</div>
            <ul class="sub-menu">
                <li><a onclick="loadMD('aglaonema/sample.md')">SAMPLE_SPECIMEN_A01</a></li>
            </ul>

            <div class="category-label">Homalomena</div>
            <ul class="sub-menu">
                <li><a onclick="loadMD('homalomena/sample.md')">SAMPLE_SPECIMEN_H01</a></li>
            </ul>

            <div class="category-label">System</div>
            <ul class="sub-menu">
                <li><a onclick="loadMD('README.md')">ABOUT ARCHIVE</a></li>
            </ul>
        </nav>

        <div class="sidebar-footer">
            <a href="https://instagram.com/cataniical" target="_blank">INSTAGRAM</a>
            <a href="https://x.com/cataniical" target="_blank">X</a>
        </div>
    </aside>

    <main class="main-content">
        <div id="content-area" class="archive-entry">
            INITIATING ARCHIVE...
        </div>
    </main>

    <script>
        async function loadMD(filePath) {
            const contentArea = document.getElementById('content-area');
            try {
                // キャッシュ回避のためのパラメータ付与
                const response = await fetch(filePath + '?v=' + new Date().getTime());
                if (!response.ok) throw new Error('FILE_NOT_FOUND: ' + filePath);
                const text = await response.text();
                
                // Markdownのパース
                contentArea.innerHTML = marked.parse(text);
                
                // ページ上部へスクロール
                document.querySelector('.main-content').scrollTop = 0;

            } catch (error) {
                contentArea.innerHTML = `
                    <div style="color:#cc0000; padding:20px; border:1px solid #cc0000;">
                        [ERROR_LOG]<br>
                        STATUS: FAILED_TO_LOAD<br>
                        TARGET: ${filePath}<br>
                        MESSAGE: ${error.message}<br><br>
                        <small>※指定されたパスにMarkdownファイルが存在するか確認してください。</small>
                    </div>`;
            }
        }

        // 初回起動時
        window.onload = () => {
            loadMD('README.md');
        };
    </script>
</body>
</html>
