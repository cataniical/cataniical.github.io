<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cataniical</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime&family=Noto+Serif+JP:wght@200&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #1a1a1a;
            font-family: 'Courier Prime', 'Noto Serif JP', serif;
            line-height: 2.2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            letter-spacing: 0.08em;
            -webkit-font-smoothing: antialiased;
        }

        article {
            max-width: 600px;
            padding: 40px;
            width: 100%;
        }

        header {
            margin-bottom: 80px;
        }

        /* 画像とタイトルを分離せず、一貫したベースラインで保持 */
        .brand-area {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 0.5rem;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 400;
            margin: 0;
            font-family: 'Courier Prime', monospace;
        }

        .logo {
            display: block;
            height: 32px;
            width: auto;
        }

        .definition {
            font-size: 0.75rem;
            color: #888;
            font-family: 'Noto Serif JP', serif;
            display: block; /* 崩れを防ぐため独立 */
            margin-top: 4px;
        }

        section {
            margin-bottom: 60px;
        }

        p {
            margin: 0;
        }

        .creed-title {
            margin-bottom: 1.8rem;
            font-weight: 400;
            border-bottom: 1px solid #eee;
            display: inline-block;
            padding-bottom: 4px;
        }

        .creed-list {
            list-style: none;
            padding-left: 0;
            margin-top: 0.5rem;
            margin-bottom: 2.5rem;
        }

        .creed-list li {
            margin-bottom: 0.8rem;
            padding-left: 0.5rem;
        }

        ruby rt {
            font-size: 0.55em;
            letter-spacing: 0.05em;
            color: #999;
        }

        footer {
            margin-top: 120px;
            font-size: 0.85rem;
            color: #444;
        }

        @media (max-width: 480px) {
            article {
                padding: 30px;
            }
            .brand-area {
                gap: 10px;
            }
        }
    </style>
</head>
<body>

<article>
    <header>
        <div class="brand-area">
            <img src="./assets/img/logo_catasumi.jpg" alt="" class="logo">
            <h1>cataniical</h1>
        </div>
        <span class="definition">cataniical は「片隅ボタニカル」の略称です。</span>
    </header>

    <main>
        <section class="about">
            <p>都会の片隅で植物を育て、記録を残しています。</p>
        </section>

        <section class="creed">
            <p class="creed-title">規律 / Creed</p>
            <p>三つの信条</p>
            <ul class="creed-list">
                <li>一、<ruby>一掃一礼<rt>いっそういちれい</rt></ruby></li>
                <li>二、<ruby>吾唯知足<rt>われただたるをしる</rt></ruby></li>
                <li>三、<ruby>綿綿密密<rt>めんめんみつみつ</rt></ruby></li>
            </ul>
        </section>
    </main>

    <footer>
        <p>その先にある静寂を、記録し続けます。</p>
    </footer>
</article>

</body>
</html>
