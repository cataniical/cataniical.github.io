<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CATANIICAL DIGITAL ARCHIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #ffffff; --sidebar-bg: #f8f9fa; --text-main: #1a1a1a; --font-mono: 'Noto Sans Mono', monospace; }
        body { margin: 0; display: flex; height: 100vh; font-family: var(--font-mono); background-color: var(--bg-color); color: var(--text-main); overflow: hidden; }
        .sidebar { width: 260px; background-color: var(--sidebar-bg); border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; flex-shrink: 0; }
        .brand-header { padding: 40px 25px 20px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; border-bottom: 1px solid #eee; }
        .nav-menu { list-style: none; padding: 0; margin: 0; }
        .category-label { padding: 20px 25px 5px; font-size: 0.7rem; color: #888; text-transform: uppercase; }
        .sub-menu { list-style: none; padding: 0; }
        .sub-menu li { padding: 10px 25px; font-size: 0.8rem; border-bottom: 1px solid #f0f0f0; }
        .main-content { flex: 1; padding: 60px; overflow-y: auto; text-align: center; }
        
        /* ロゴ周りの絶対的スタイル */
        .logo-container { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 40px; }
        .logo-mark { width: 80px; height: auto; }
        .logo-text { max-width: 400px; width: 100%; height: auto; mix-blend-mode: multiply; filter: contrast(1.1) grayscale(1); }
        .about-section { max-width: 600px; margin: 0 auto; text-align: left; line-height: 2; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="brand-header">CATANIICAL</div>
        <nav class="nav-menu">
            <div class="category-label">Archive</div>
            <ul class="sub-menu"><li>HOME / ABOUT</li></ul>
        </nav>
    </aside>
    <main class="main-content">
        <div class="logo-container">
            <img src="https://raw.githubusercontent.com/cataniical/cataniical.github.io/main/assets/img/logomark_c.jpg" class="logo-mark" alt="mark">
            <img src="https://raw.githubusercontent.com/cataniical/cataniical.github.io/main/assets/img/logo_catasumi.jpg" class="logo-text" alt="text">
        </div>
        
        <div class="about-section">
            <h3>About カタニカル</h3>
            <p><strong>片隅にボタニカルを その記録とともに</strong></p>
            <p>#カタニカル, #cataniical</p>
            <p>日々の植物達の成長などを発信しています。</p>
            <hr>
            <p>© 2026 cataniical</p>
        </div>
    </main>
</body>
</html>
