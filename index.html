<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CATANIICAL DIGITAL ARCHIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <style>
        :root { 
            --bg-color: #ffffff; 
            --sidebar-bg: #f8f9fa; 
            --text-main: #1a1a1a; 
            --font-mono: 'Noto Sans Mono', monospace; 
            --accent-color: #000;
        }
        body { margin: 0; display: flex; height: 100vh; font-family: var(--font-mono); background-color: var(--bg-color); color: var(--text-main); overflow: hidden; }
        
        /* サイドバー設計 */
        .sidebar { width: 260px; background-color: var(--sidebar-bg); border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; flex-shrink: 0; }
        .brand-header { padding: 40px 25px 20px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; border-bottom: 1px solid #eee; }
        .nav-menu { list-style: none; padding: 0; margin: 0; overflow-y: auto; flex-grow: 1; }
        .category-label { padding: 20px 25px 5px; font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 0.1em; }
        .sub-menu { list-style: none; padding: 0; margin-bottom: 15px; }
        .sub-menu li a { display: block; padding: 8px 25px; text-decoration: none; color: #333; font-size: 0.8rem; cursor: pointer; transition: background 0.2s; }
        .sub-menu li a:hover { background-color: #eee; }
        
        /* メインコンテンツエリア */
        .main-content { flex: 1; overflow-y: auto; background-color: #ffffff; }
        .archive-entry { max-width: 900px; margin: 0 auto; padding: 60px 40px; line-height: 1.8; }
        
        /* ロゴ周りのスタイル */
        .logo-container { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 40px; padding-bottom: 40px; border-bottom: 1px solid #f0f0f0; }
        .logo-mark { width: 80px; height: auto; }
        .logo-text { max-width: 400px; width: 100%; height: auto; mix-blend-mode: multiply; filter: contrast(1.1) grayscale(1); }
        
        /* Markdown描画時の調整 */
        .archive-entry h1, .archive-entry h2, .archive-entry h3 { margin-top: 1.5em; border-bottom: 1px solid #eee; padding-bottom: 0.5em; }
        .archive-entry img { max-width: 100%; height: auto; margin: 20px 0; }
        .archive-entry a { color: var(--text-main); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="brand-header" onclick="location.href='index.html'">CATANIICAL</div>
        <nav class="nav-menu">
            <div class="category-label">Base</div>
            <ul class="sub-menu">
                <li><a onclick="loadContent('README.md')">HOME / ABOUT</a></li>
            </ul>

            <div class="category-label">Aglaonema</div>
            <ul class="sub-menu">
                <li><a onclick="loadContent('aglaonema/pictum_tricolor.md')">PICTUM_TRICOLOR</a></li>
                <li><a onclick="loadContent('aglaonema/nitidum_curtisii.md')">NITIDUM_CURTISII</a></li>
            </ul>

            <div class="category-label">Platycerium</div>
            <ul class="sub-menu">
                <li><a onclick="loadContent('platycerium/ridleyi.md')">RIDLEYI</a></li>
                <li><a onclick="loadContent('platycerium/willinckii.md')">WILLINCKII</a></li>
            </ul>

            <div class="category-label">Monstera</div>
            <ul class="sub-menu">
                <li><a onclick="loadContent('monstera/deliciosa_var.md')">DELICIOSA_VAR</a></li>
            </ul>
        </nav>
    </aside>

    <main class="main-content">
        <div id="content-area" class="archive-entry">
            <div class="logo-container">
                <img src="https://raw.githubusercontent.com/cataniical/cataniical.github.io/main/assets/img/logomark_c.jpg" class="logo-mark" alt="mark">
                <img src="https://raw.githubusercontent.com/cataniical/cataniical.github.io/main/assets/img/logo_catasumi.jpg" class="logo-text" alt="text">
            </div>
            
            <div id="md-render-area">
                <h3>About カタニカル</h3>
                <p><strong>片隅にボタニカルを その記録とともに</strong></p>
                <p>#カタニカル, #cataniical</p>
                <p>日々の植物達の成長などを発信しています。</p>
                <hr>
                <p>© 2026 cataniical</p>
            </div>
        </div>
    </main>

    <script>
        async function loadContent(path) {
            const area = document.getElementById('content-area');
            try {
                const response = await fetch(path + '?v=' + Date.now());
                if (!response.ok) throw new Error('FILE_NOT_FOUND');
                const mdText = await response.text();

                // 外部ファイル読み込み時は、ロゴを消してMarkdownを描画
                if (typeof marked !== 'undefined') {
                    area.innerHTML = marked.parse(mdText);
                } else {
                    area.innerText = mdText;
                }
                
                document.querySelector('.main-content').scrollTop = 0;
            } catch (e) {
                // ファイルがない場合は Coming Soon 表示にする
                area.innerHTML = `
                    <div style="padding:100px 0; text-align:center; color:#ccc;">
                        <h2 style="letter-spacing:0.2em;">COMING SOON</h2>
                        <p style="font-size:0.8rem;">SPECIMEN DATA: ${path}</p>
                        <a href="#" onclick="location.reload()" style="color:#1a1a1a; font-size:0.7rem; text-decoration:underline;">BACK TO HOME</a>
                    </div>`;
            }
        }
    </script>
</body>
</html>
