<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CATANIICAL DIGITAL ARCHIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* スタイルは極めてシンプルに、かつ堅牢に */
        :root { --bg-color: #ffffff; --sidebar-bg: #f8f9fa; --text-main: #1a1a1a; --font-mono: 'Noto Sans Mono', monospace; }
        body { margin: 0; display: flex; height: 100vh; font-family: var(--font-mono); background-color: var(--bg-color); overflow: hidden; }
        
        /* サイドバー */
        .sidebar { width: 260px; background-color: var(--sidebar-bg); border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; flex-shrink: 0; }
        .brand-header { padding: 40px 25px 20px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; border-bottom: 1px solid #eee; }
        .nav-menu { list-style: none; padding: 0; margin: 0; overflow-y: auto; flex-grow: 1; }
        .category-label { padding: 20px 25px 5px; font-size: 0.7rem; color: #888; text-transform: uppercase; }
        .sub-menu { list-style: none; padding: 0; margin-bottom: 15px; }
        .sub-menu li a { display: block; padding: 10px 25px; text-decoration: none; color: #333; font-size: 0.8rem; cursor: pointer; }
        .sub-menu li a:hover { background-color: #eee; }

        /* メインコンテンツエリア：iframeによる直接表示 */
        .main-content { flex: 1; position: relative; background-color: #ffffff; }
        /* iframeはブラウザの標準機能なので、読み込み失敗が極めて少ない */
        #content-frame { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="brand-header" onclick="location.reload()">CATANIICAL</div>
        <nav class="nav-menu">
            <div class="category-label">Archive</div>
            <ul class="sub-menu">
                <li><a onclick="loadContent('README.md')">HOME / ABOUT</a></li>
            </ul>
        </nav>
    </aside>

    <main class="main-content">
        <iframe id="content-frame" src="README.md"></iframe>
    </main>

    <script>
        function loadContent(path) {
            // ライブラリを一切使わず、srcを書き換えるだけの物理的解決
            const frame = document.getElementById('content-frame');
            frame.src = path + '?v=' + Date.now();
        }
    </script>
</body>
</html>
