<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cataniical</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Noto+Serif+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #000000;
            font-family: 'Courier Prime', 'Noto Serif JP', serif;
            font-size: 1.1rem;
            line-height: 2.3;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            letter-spacing: 0.1em;
            -webkit-font-smoothing: antialiased;
        }

        article {
            max-width: 650px;
            padding: 60px 40px;
            width: 100%;
        }

        header {
            margin-bottom: 100px;
            display: flex;
            align-items: baseline;
            gap: 20px;
            flex-wrap: wrap;
        }

        h1 {
            margin: 0;
            line-height: 0;
        }

        .logo {
            display: block;
            height: 40px;
            width: auto;
        }

        .definition {
            font-size: 0.9rem;
            font-family: 'Noto Serif JP', serif;
            font-weight: 500;
        }

        section {
            margin-bottom: 80px;
        }

        p {
            margin: 0;
        }

        .creed-title {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            font-weight: 700;
            border-bottom: 3px solid #000000;
            display: inline-block;
            padding-bottom: 6px;
        }

        .creed-list {
            list-style: none;
            padding-left: 0;
            margin-top: 1rem;
            margin-bottom: 3rem;
        }

        .creed-list li {
            margin-bottom: 1.2rem;
            font-weight: 500;
        }

        ruby rt {
            font-size: 0.6em;
            letter-spacing: 0.1em;
            color: #000000;
            font-weight: 700;
        }

        footer {
            margin-top: 150px;
            padding-top: 20px;
            border-top: 1px solid #000000;
            font-size: 0.95rem;
            font-weight: 500;
            text-align: right;
        }

        .footer-brand {
            display: block;
            font-family: 'Courier Prime', monospace;
            font-size: 1.1rem;
            margin-top: 10px;
            letter-spacing: 0.2em;
        }

        @media (max-width: 480px) {
            article {
                padding: 40px 25px;
            }
            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            footer {
                text-align: left;
            }
        }
    </style>
</head>
<body>

<article>
    <header>
        <h1><img src="./assets/img/logo_catasumi.jpg" alt="cataniical" class="logo"></h1>
        <span class="definition">は「片隅ボタニカル」の略称です。</span>
    </header>

    <main>
        <section class="about">
            <p>都会の片隅で植物を育て、記録を残しています。</p>
        </section>

        <section class="creed">
            <p class="creed-title">規律 / Creed</p>
            <p>三つの信条</p>
            <ul class="creed-list">
                <li>一、<ruby>一掃一礼<rt>いっそういちれい</rt></ruby></li>
                <li>二、<ruby>吾唯知足<rt>われただたるをしる</rt></ruby></li>
                <li>三、<ruby>綿綿密密<rt>めんめんみつみつ</rt></ruby></li>
            </ul>
        </section>
    </main>

    <footer>
        <p>その先にある静寂を、記録し続けます。</p>
        <span class="footer-brand">&copy; cataniical</span>
    </footer>
</article>

</body>
</html>
